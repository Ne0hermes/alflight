<!doctype html>
<html lang="fr" xml:lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Language" content="fr" />
    <link rel="icon" type="image/png" href="/favicon-32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ALFlight - Assistant de Vol</title>
    
    <!-- PWA Meta Tags — charte ALFlight noir/orange (Mai 2026) -->
    <meta name="theme-color" content="#0A0A0A" />
    <!-- Standard (non-Apple PWAs : Chrome, Edge, Firefox sur Android, etc.).
         Doit précéder apple-mobile-web-app-capable pour éviter le warning de dépréciation. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Conservé pour compatibilité iOS Safari (les deux tags sont nécessaires
         tant que Safari ne supporte pas encore "mobile-web-app-capable"). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ALFlight" />

    <!-- Apple Touch Icons (différentes tailles pour compatibilité) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-apple-180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-apple-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-apple-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icon-apple-120.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS - IMPORTANT pour l'affichage de la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    
    <!-- Leaflet JS - IMPORTANT pour l'affichage de la carte -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    
    <!-- PDF.js pour l'extraction de texte des PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      // Configuration de PDF.js
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
    </script>
    
    <!-- Google Identity Services for Sign In -->
    <!-- <script src="https://accounts.google.com/gsi/client" async defer></script> -->
    
    <!-- Apple Sign In JS - Désactivé temporairement -->
    <!-- <script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script> -->
    
    <!-- Force le fond NOIR ALFlight immédiatement (anti-FOUC + anti-cadre-blanc au zoom).
         La valeur est synchronisée avec la variable --app-bg définie dans src/index.css.
         Si tu changes la couleur de --app-bg, change AUSSI le theme-color ci-dessus et
         ces 3 occurrences ci-dessous. C'est le SEUL endroit où cette couleur peut être
         dupliquée (pré-CSS), parce que ces styles s'appliquent avant le chargement de
         index.css. -->
    <style>
      html, body {
        background-color: #0A0A0A !important;
        background: #0A0A0A !important;
        color: #F5F2EC !important;
        /* Support des safe areas pour iPhone (encoche, barre d'état) */
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      #root {
        background-color: #0A0A0A !important;
        background: #0A0A0A !important;
        min-height: 100vh;
      }
    </style>
  </head>
  <body lang="fr">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration - DÉSACTIVÉ en développement -->
    <script>
      // ⚠️ IMPORTANT : Service Worker DÉSACTIVÉ en mode développement
      // pour éviter le cache qui force Ctrl+Shift+R à chaque changement
      const isDevelopment = window.location.hostname === 'localhost' ||
                            window.location.hostname === '127.0.0.1' ||
                            window.location.port === '4001';

      if (!isDevelopment && 'serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(registration => {
              console.log('✅ Service Worker registered:', registration);
            })
            .catch(error => {
              console.error('❌ Service Worker registration failed:', error);
            });
        });
      } else if (isDevelopment) {
        console.log('🔧 Mode développement : Service Worker DÉSACTIVÉ');

        // Désenregistrer tous les service workers existants en dev
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            registrations.forEach(registration => {
              registration.unregister();
              console.log('🗑️ Service Worker désenregistré:', registration);
            });
          });
        }

        // Nettoyer les caches existants en dev
        if ('caches' in window) {
          caches.keys().then(names => {
            names.forEach(name => {
              caches.delete(name);
              console.log('🗑️ Cache supprimé:', name);
            });
          });
        }
      }
    </script>
  </body>
</html>
